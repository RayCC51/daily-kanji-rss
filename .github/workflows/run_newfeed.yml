name: Daily Kanji RSS Update

on:
  schedule:
    - cron: '0 20 * * *' # 매일 KST 아침 5시
  workflow_dispatch:

# 깃허브 페이지 직접 배포를 위한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
    # v4에서 변경 없음 (Node 24 공식 지원 버전을 이미 쓰고 계셨으나 경고 방지를 위해 유지)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. 캐시 복원 (v4 유지하되 완벽한 호환성을 위해 아래 코드와 싱크)
    - name: Restore current day cache
      uses: actions/cache/restore@v4
      with:
        path: ./current_day.txt
        key: kanji-day-cache

    - name: Make script executable
      run: chmod +x ./newfeed.sh

    # 2. 스크립트 실행
    - name: Run newfeed script
      run: ./newfeed.sh

    # 3. 캐시 다시 저장 (v4 유지)
    - name: Save current day cache
      uses: actions/cache/save@v4
      with:
        path: ./current_day.txt
        key: kanji-day-cache

    # 4. 배포할 파일들을 아티팩트로 묶기 (★ v3에서 v4로 업그레이드)
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: 'web' # index.html, rss.xml

    # 5. 깃허브 페이지 서버로 배포 (★ v4에서 v5로 업그레이드)
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5
